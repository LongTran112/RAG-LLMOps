apiVersion: v1
kind: Service
metadata:
  name: rag-backend
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: rag-backend
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  selector:
    app.kubernetes.io/name: rag-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: rag-backend
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  # Do NOT pin `replicas` here -- the HPA (k8s/backend/backend-hpa.yaml) owns
  # this field. Re-applying this manifest with a hard-coded replica count
  # fights the HPA's decision and causes the pod count to oscillate, which
  # corrupts the RPS / cost-per-1000-requests numbers during benchmarks.
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-backend
        app.kubernetes.io/part-of: rag-k8s-thesis
      annotations:
        # Makes the pod's /metrics endpoint scrapable by a generic Prometheus
        # config (our PodMonitor uses the same port + path and works whether
        # kube-prometheus-stack is installed or not).
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: rag-backend
          image: rag-k8s-thesis/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: QDRANT_HOST
              value: qdrant
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_COLLECTION
              value: thesis_docs_active
            - name: QDRANT_TOP_K
              value: "4"
            - name: QDRANT_TOP_K_PRODUCT
              value: "3"
            - name: PRODUCT_LATENCY_MODE
              value: "true"
            - name: OLLAMA_MAX_OUTPUT_TOKENS
              value: "256"
            - name: OLLAMA_TEMPERATURE
              value: "0.1"
            - name: LLM_PROVIDER
              value: ollama
            - name: LLM_BASE_URL
              value: http://ollama:11434
            - name: LLM_MODEL
              value: granite3.3:8b
            - name: LLM_FALLBACK_MODEL
              value: phi3:mini
            - name: LLM_MAX_RETRIES
              value: "2"
            - name: LLM_RETRY_BACKOFF_SECONDS
              value: "1.5"
            - name: QDRANT_MAX_RETRIES
              value: "1"
            - name: QDRANT_RETRY_BACKOFF_SECONDS
              value: "0.5"
            - name: WARMUP_LLM_ON_STARTUP
              value: "true"
            - name: REQUEST_TIMEOUT_SECONDS
              value: "900"
          # 8 uvicorn workers (WEB_CONCURRENCY=8) so the GKE vs Cloud Run RPS
          # comparison is fair at the web-server layer. Backend is I/O-bound
          # on Ollama/Qdrant so 2 CPUs is enough; bump if you raise workers.
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 8
            periodSeconds: 5
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-backend
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: rag-backend
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  rules:
    - host: rag.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-backend
                port:
                  number: 80
