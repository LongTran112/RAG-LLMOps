apiVersion: batch/v1
kind: Job
metadata:
  name: rag-ingestion-once
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: rag-ingestion
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-ingestion
        app.kubernetes.io/part-of: rag-k8s-thesis
    spec:
      restartPolicy: Never
      containers:
        - name: rag-ingestion
          image: rag-k8s-thesis/ingestion:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: QDRANT_HOST
              value: qdrant
            - name: QDRANT_PORT
              value: "6333"
            - name: QDRANT_COLLECTION
              value: "thesis_docs_active"
            - name: QDRANT_COLLECTION_BASE
              value: "thesis_docs"
            - name: INGEST_INPLACE
              value: "false"
            - name: DATA_DIR
              value: /data/sec_rag_dataset_100_pdf
            - name: EMBEDDING_BATCH_SIZE
              value: "8"
            - name: MAX_DOCS
              value: "1500"
          volumeMounts:
            - name: sec-rag-dataset
              mountPath: /data/sec_rag_dataset_100_pdf
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: sec-rag-dataset
          hostPath:
            path: /host/MasterThesis/sec_rag_dataset_100_pdf
            type: Directory
