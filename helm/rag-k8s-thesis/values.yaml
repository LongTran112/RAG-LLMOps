nameOverride: ""
fullnameOverride: ""

namespaceOverride: "rag-thesis"

commonLabels:
  app.kubernetes.io/part-of: rag-k8s-thesis

qdrant:
  enabled: true
  image: qdrant/qdrant:latest
  replicaCount: 1
  # Sized for the 100-PDF thesis corpus (~50 k pages → ~150–200 k chunks).
  storageSize: 25Gi
  service:
    port: 6333
  # Thesis metric "active RAM footprint on ~50 k pages" needs headroom so the
  # kernel does not OOM-kill or swap while we sample RSS.
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "2"
      memory: 8Gi

ollama:
  enabled: true
  image: ollama/ollama:latest
  replicaCount: 2
  modelName: granite3.3:8b
  # Keep enough disk to persist the full thesis trio across benchmark runs:
  # deepseek-r1:8b (reasoning), granite3.3:8b (fast), phi3:mini (fallback).
  storageSize: 40Gi
  # Default to 4k context for the 8B fast/reasoning model set.
  contextLength: 4096
  keepAlive: 24h
  service:
    port: 11434
  # Default request/limits target 8B-class models. Use model-specific overrides
  # in helm/rag-k8s-thesis/overrides for exact benchmark rows.
  resources:
    requests:
      cpu: 1000m
      memory: 6Gi
    limits:
      cpu: 2000m
      memory: 10Gi
  gpu:
    enabled: false
    count: 1
    nodeSelector:
      accelerator: nvidia
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

backend:
  enabled: true
  image: rag-k8s-thesis/backend:latest
  replicaCount: 2
  service:
    port: 80
    targetPort: 8000
  ingress:
    enabled: true
    host: rag.local
    path: /
    pathType: Prefix
  env:
    llmProvider: ollama
    llmBaseUrl: http://ollama:11434
    llmModel: granite3.3:8b
    # Resilience: fallback model used if the primary fails after retries.
    # Set to "" to disable the fallback leg.
    llmFallbackModel: phi3:mini
    llmMaxRetries: 2
    llmRetryBackoffSeconds: "1.5"
    qdrantMaxRetries: 1
    qdrantRetryBackoffSeconds: "0.5"
    # Points at the blue/green alias; see ingest_data.py for swap semantics.
    qdrantCollection: thesis_docs_active
    qdrantTopK: 4
    qdrantTopKProduct: 3
    productLatencyMode: true
    ollamaMaxOutputTokens: 256
    ollamaTemperature: 0.1
    warmupLlmOnStartup: true
    embeddingModelName: sentence-transformers/all-MiniLM-L6-v2
    requestTimeoutSeconds: 900
  # 8 uvicorn workers (WEB_CONCURRENCY=8, set in backend/Dockerfile) so the
  # GKE vs Cloud Run RPS comparison is fair at the web-server layer.
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 3Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    targetCPUUtilizationPercentage: 65

ingestion:
  enabled: true
  image: rag-k8s-thesis/ingestion:latest
  dataset:
    enabled: true
    # hostPath = Minikube/local node path. gcs = download from gs://bucket/prefix into emptyDir (needs GKE SA + bucket IAM).
    source: hostPath
    hostPath: /host/MasterThesis/sec_rag_dataset_100_pdf
    mountPath: /data/sec_rag_dataset_100_pdf
    dataDir: /data/sec_rag_dataset_100_pdf
    gcsUri: ""
  job:
    enabled: true
    backoffLimit: 2
  cronjob:
    enabled: false
    schedule: "0 2 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
  env:
    # Logical alias the API reads from (see ingest_data.py blue/green logic).
    qdrantCollection: thesis_docs_active
    # Prefix used for the dated physical collection (thesis_docs_YYYYMMDD_HHMMSS).
    qdrantCollectionBase: thesis_docs
    # When "true", writes directly into the alias (legacy). Default false enables
    # blue/green: new collection per ingest, atomic alias swap at the end.
    ingestInplace: "false"
    embeddingModelName: sentence-transformers/all-MiniLM-L6-v2
    chunkSize: "800"
    chunkOverlap: "100"
    embeddingBatchSize: "64"
    maxDocs: "0"
    # If non-empty, every ingestion run appends one row to this CSV inside the
    # container (mount a PVC or emptyDir if you want to persist across runs).
    metricsCsv: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

frontend:
  enabled: true
  image: rag-k8s-thesis/frontend:latest
  replicaCount: 1
  service:
    port: 80
    targetPort: 8501
  ingress:
    enabled: true
    host: rag-ui.local
    path: /
    pathType: Prefix
  env:
    backendUrl: http://rag-backend
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
