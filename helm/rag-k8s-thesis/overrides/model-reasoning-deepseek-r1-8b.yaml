# Helm overlay for the reasoning model row.
ollama:
  modelName: deepseek-r1:8b
  contextLength: 4096
  resources:
    requests:
      cpu: 2000m
      memory: 12Gi
    limits:
      cpu: 4000m
      memory: 20Gi

backend:
  env:
    llmModel: deepseek-r1:8b
    llmFallbackModel: phi3:mini
    requestTimeoutSeconds: 1200
