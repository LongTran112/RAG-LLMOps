{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: rag-frontend
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-frontend
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: rag-frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-frontend
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-frontend
        {{- include "rag-k8s-thesis.labels" . | nindent 8 }}
    spec:
      containers:
        - name: rag-frontend
          image: {{ .Values.frontend.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.frontend.service.targetPort }}
              name: http
          env:
            - name: RAG_BACKEND_URL
              value: {{ .Values.frontend.env.backendUrl | quote }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
{{- if .Values.frontend.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-frontend
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-frontend
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  rules:
    - host: {{ .Values.frontend.ingress.host }}
      http:
        paths:
          - path: {{ .Values.frontend.ingress.path }}
            pathType: {{ .Values.frontend.ingress.pathType }}
            backend:
              service:
                name: rag-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
{{- end }}
{{- end }}
