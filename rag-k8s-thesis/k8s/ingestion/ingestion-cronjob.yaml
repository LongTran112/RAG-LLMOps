apiVersion: batch/v1
kind: CronJob
metadata:
  name: rag-ingestion-nightly
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: rag-ingestion
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rag-ingestion
            app.kubernetes.io/part-of: rag-k8s-thesis
        spec:
          restartPolicy: Never
          containers:
            - name: rag-ingestion
              image: rag-k8s-thesis/ingestion:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: QDRANT_HOST
                  value: qdrant
                - name: QDRANT_PORT
                  value: "6333"
                - name: QDRANT_COLLECTION
                  value: "thesis_docs_active"
                - name: QDRANT_COLLECTION_BASE
                  value: "thesis_docs"
                - name: INGEST_INPLACE
                  value: "false"
                - name: DATA_DIR
                  value: /data/sec_rag_dataset_50
                - name: EMBEDDING_BATCH_SIZE
                  value: "64"
                - name: MAX_DOCS
                  value: "0"
              volumeMounts:
                - name: sec-rag-dataset
                  mountPath: /data/sec_rag_dataset_50
                  readOnly: true
          volumes:
            - name: sec-rag-dataset
              hostPath:
                path: /host/MasterThesis/sec_rag_dataset_50
                type: Directory
