apiVersion: batch/v1
kind: CronJob
metadata:
  name: rag-ingestion-nightly
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: rag-ingestion
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rag-ingestion
            app.kubernetes.io/part-of: rag-k8s-thesis
        spec:
          restartPolicy: Never
          containers:
            - name: rag-ingestion
              image: rag-k8s-thesis/ingestion:latest
              imagePullPolicy: IfNotPresent
              env:
                - name: QDRANT_HOST
                  value: qdrant
                - name: QDRANT_PORT
                  value: "6333"
