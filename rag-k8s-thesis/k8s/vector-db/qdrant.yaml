apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  accessModes:
    - ReadWriteOnce
  # Sized for the 100-PDF thesis corpus (~50 k pages → ~150–200 k chunks).
  # MiniLM-L6 vectors + HNSW graph + payloads comfortably fit in 25 GiB.
  resources:
    requests:
      storage: 25Gi
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  selector:
    app.kubernetes.io/name: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: rag-thesis
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: rag-k8s-thesis
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
        app.kubernetes.io/part-of: rag-k8s-thesis
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
              name: http
          # Thesis metric "active RAM footprint of the Vector DB on ~50 k pages"
          # needs headroom so the kernel does not OOM-kill or swap while we
          # sample RSS. 4 GiB request / 8 GiB limit keeps the HNSW graph and
          # 384-dim MiniLM vectors resident for the full 100-PDF corpus.
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
          livenessProbe:
            httpGet:
              path: /healthz
              port: 6333
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-pvc
