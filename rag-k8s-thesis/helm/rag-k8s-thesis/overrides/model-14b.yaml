# Helm overlay for the qwen2.5:14b thesis row. Fits on nvidia-l4 (24 GB VRAM).
ollama:
  modelName: qwen2.5:14b
  contextLength: 4096
  resources:
    requests:
      cpu: 2000m
      memory: 16Gi
    limits:
      cpu: 4000m
      memory: 24Gi

backend:
  env:
    llmModel: qwen2.5:14b
    llmFallbackModel: phi3:mini
