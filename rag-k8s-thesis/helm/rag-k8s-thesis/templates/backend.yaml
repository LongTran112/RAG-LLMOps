{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: rag-backend
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-backend
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: rag-backend
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.targetPort }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-backend
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-backend
        {{- include "rag-k8s-thesis.labels" . | nindent 8 }}
    spec:
      containers:
        - name: rag-backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.backend.service.targetPort }}
              name: http
          env:
            - name: QDRANT_HOST
              value: qdrant
            - name: QDRANT_PORT
              value: {{ .Values.qdrant.service.port | quote }}
            - name: QDRANT_COLLECTION
              value: {{ .Values.backend.env.qdrantCollection | quote }}
            - name: QDRANT_TOP_K
              value: {{ .Values.backend.env.qdrantTopK | quote }}
            - name: QDRANT_TOP_K_PRODUCT
              value: {{ .Values.backend.env.qdrantTopKProduct | quote }}
            - name: PRODUCT_LATENCY_MODE
              value: {{ .Values.backend.env.productLatencyMode | quote }}
            - name: OLLAMA_MAX_OUTPUT_TOKENS
              value: {{ .Values.backend.env.ollamaMaxOutputTokens | quote }}
            - name: OLLAMA_TEMPERATURE
              value: {{ .Values.backend.env.ollamaTemperature | quote }}
            - name: LLM_PROVIDER
              value: {{ .Values.backend.env.llmProvider | quote }}
            - name: LLM_BASE_URL
              value: {{ .Values.backend.env.llmBaseUrl | quote }}
            - name: LLM_MODEL
              value: {{ .Values.backend.env.llmModel | quote }}
            - name: LLM_FALLBACK_MODEL
              value: {{ .Values.backend.env.llmFallbackModel | quote }}
            - name: LLM_MAX_RETRIES
              value: {{ .Values.backend.env.llmMaxRetries | quote }}
            - name: LLM_RETRY_BACKOFF_SECONDS
              value: {{ .Values.backend.env.llmRetryBackoffSeconds | quote }}
            - name: QDRANT_MAX_RETRIES
              value: {{ .Values.backend.env.qdrantMaxRetries | quote }}
            - name: QDRANT_RETRY_BACKOFF_SECONDS
              value: {{ .Values.backend.env.qdrantRetryBackoffSeconds | quote }}
            - name: WARMUP_LLM_ON_STARTUP
              value: {{ .Values.backend.env.warmupLlmOnStartup | quote }}
            - name: EMBEDDING_MODEL_NAME
              value: {{ .Values.backend.env.embeddingModelName | quote }}
            - name: REQUEST_TIMEOUT_SECONDS
              value: {{ .Values.backend.env.requestTimeoutSeconds | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.service.targetPort }}
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.backend.service.targetPort }}
            initialDelaySeconds: 8
            periodSeconds: 5
{{- if .Values.backend.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-backend
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-backend
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  rules:
    - host: {{ .Values.backend.ingress.host }}
      http:
        paths:
          - path: {{ .Values.backend.ingress.path }}
            pathType: {{ .Values.backend.ingress.pathType }}
            backend:
              service:
                name: rag-backend
                port:
                  number: {{ .Values.backend.service.port }}
{{- end }}
{{- end }}
