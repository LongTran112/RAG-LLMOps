{{- if and .Values.ingestion.enabled .Values.ingestion.job.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: rag-ingestion-once
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-ingestion
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.ingestion.job.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-ingestion
        {{- include "rag-k8s-thesis.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: rag-ingestion
          image: {{ .Values.ingestion.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: QDRANT_HOST
              value: qdrant
            - name: QDRANT_PORT
              value: {{ .Values.qdrant.service.port | quote }}
            - name: QDRANT_COLLECTION
              value: {{ .Values.ingestion.env.qdrantCollection | quote }}
            - name: QDRANT_COLLECTION_BASE
              value: {{ .Values.ingestion.env.qdrantCollectionBase | quote }}
            - name: INGEST_INPLACE
              value: {{ .Values.ingestion.env.ingestInplace | quote }}
            - name: EMBEDDING_MODEL_NAME
              value: {{ .Values.ingestion.env.embeddingModelName | quote }}
            - name: CHUNK_SIZE
              value: {{ .Values.ingestion.env.chunkSize | quote }}
            - name: CHUNK_OVERLAP
              value: {{ .Values.ingestion.env.chunkOverlap | quote }}
            - name: EMBEDDING_BATCH_SIZE
              value: {{ .Values.ingestion.env.embeddingBatchSize | quote }}
            - name: MAX_DOCS
              value: {{ .Values.ingestion.env.maxDocs | quote }}
            - name: INGESTION_METRICS_CSV
              value: {{ .Values.ingestion.env.metricsCsv | quote }}
            {{- if .Values.ingestion.dataset.enabled }}
            - name: DATA_DIR
              value: {{ .Values.ingestion.dataset.dataDir | quote }}
            {{- end }}
            {{- if and .Values.ingestion.dataset.enabled (eq (.Values.ingestion.dataset.source | default "hostPath") "gcs") }}
            - name: GCS_DATA_URI
              value: {{ .Values.ingestion.dataset.gcsUri | quote }}
            {{- end }}
          {{- if .Values.ingestion.dataset.enabled }}
          volumeMounts:
            - name: sec-rag-dataset
              mountPath: {{ .Values.ingestion.dataset.mountPath | quote }}
              readOnly: {{ ne (.Values.ingestion.dataset.source | default "hostPath") "gcs" }}
          {{- end }}
          resources:
            {{- toYaml .Values.ingestion.resources | nindent 12 }}
      {{- if .Values.ingestion.dataset.enabled }}
      volumes:
        - name: sec-rag-dataset
          {{- if eq (.Values.ingestion.dataset.source | default "hostPath") "gcs" }}
          emptyDir: {}
          {{- else }}
          hostPath:
            path: {{ .Values.ingestion.dataset.hostPath | quote }}
            type: Directory
          {{- end }}
      {{- end }}
{{- end }}
{{- if and .Values.ingestion.enabled .Values.ingestion.cronjob.enabled }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: rag-ingestion-nightly
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: rag-ingestion
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.ingestion.cronjob.schedule | quote }}
  successfulJobsHistoryLimit: {{ .Values.ingestion.cronjob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.ingestion.cronjob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.ingestion.job.backoffLimit }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: rag-ingestion
            {{- include "rag-k8s-thesis.labels" . | nindent 12 }}
        spec:
          restartPolicy: Never
          containers:
            - name: rag-ingestion
              image: {{ .Values.ingestion.image }}
              imagePullPolicy: IfNotPresent
              env:
                - name: QDRANT_HOST
                  value: qdrant
                - name: QDRANT_PORT
                  value: {{ .Values.qdrant.service.port | quote }}
                - name: QDRANT_COLLECTION
                  value: {{ .Values.ingestion.env.qdrantCollection | quote }}
                - name: QDRANT_COLLECTION_BASE
                  value: {{ .Values.ingestion.env.qdrantCollectionBase | quote }}
                - name: INGEST_INPLACE
                  value: {{ .Values.ingestion.env.ingestInplace | quote }}
                - name: EMBEDDING_MODEL_NAME
                  value: {{ .Values.ingestion.env.embeddingModelName | quote }}
                - name: CHUNK_SIZE
                  value: {{ .Values.ingestion.env.chunkSize | quote }}
                - name: CHUNK_OVERLAP
                  value: {{ .Values.ingestion.env.chunkOverlap | quote }}
                - name: EMBEDDING_BATCH_SIZE
                  value: {{ .Values.ingestion.env.embeddingBatchSize | quote }}
                - name: MAX_DOCS
                  value: {{ .Values.ingestion.env.maxDocs | quote }}
                - name: INGESTION_METRICS_CSV
                  value: {{ .Values.ingestion.env.metricsCsv | quote }}
                {{- if .Values.ingestion.dataset.enabled }}
                - name: DATA_DIR
                  value: {{ .Values.ingestion.dataset.dataDir | quote }}
                {{- end }}
                {{- if and .Values.ingestion.dataset.enabled (eq (.Values.ingestion.dataset.source | default "hostPath") "gcs") }}
                - name: GCS_DATA_URI
                  value: {{ .Values.ingestion.dataset.gcsUri | quote }}
                {{- end }}
              {{- if .Values.ingestion.dataset.enabled }}
              volumeMounts:
                - name: sec-rag-dataset
                  mountPath: {{ .Values.ingestion.dataset.mountPath | quote }}
                  readOnly: {{ ne (.Values.ingestion.dataset.source | default "hostPath") "gcs" }}
              {{- end }}
              resources:
                {{- toYaml .Values.ingestion.resources | nindent 16 }}
          {{- if .Values.ingestion.dataset.enabled }}
          volumes:
            - name: sec-rag-dataset
              {{- if eq (.Values.ingestion.dataset.source | default "hostPath") "gcs" }}
              emptyDir: {}
              {{- else }}
              hostPath:
                path: {{ .Values.ingestion.dataset.hostPath | quote }}
                type: Directory
              {{- end }}
          {{- end }}
{{- end }}
