{{- if .Values.ollama.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models-pvc
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: ollama
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.ollama.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: ollama
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - name: http
      port: {{ .Values.ollama.service.port }}
      targetPort: {{ .Values.ollama.service.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ include "rag-k8s-thesis.namespace" . }}
  labels:
    app.kubernetes.io/name: ollama
    {{- include "rag-k8s-thesis.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ollama.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        {{- include "rag-k8s-thesis.labels" . | nindent 8 }}
    spec:
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.ollama.service.port }}
              name: http
          env:
            - name: OLLAMA_CONTEXT_LENGTH
              value: {{ .Values.ollama.contextLength | quote }}
            - name: OLLAMA_KEEP_ALIVE
              value: {{ .Values.ollama.keepAlive | quote }}
          {{- if .Values.ollama.gpu.enabled }}
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | int }}
              cpu: {{ .Values.ollama.resources.limits.cpu | quote }}
              memory: {{ .Values.ollama.resources.limits.memory | quote }}
            requests:
              cpu: {{ .Values.ollama.resources.requests.cpu | quote }}
              memory: {{ .Values.ollama.resources.requests.memory | quote }}
          {{- else }}
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: ollama-models
              mountPath: /root/.ollama
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - ollama pull {{ .Values.ollama.modelName }} || true
          livenessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: ollama-models-pvc
      {{- if .Values.ollama.gpu.enabled }}
      nodeSelector:
        {{- toYaml .Values.ollama.gpu.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.ollama.gpu.tolerations | nindent 8 }}
      {{- end }}
{{- end }}
