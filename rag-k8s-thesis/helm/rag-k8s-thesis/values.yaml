nameOverride: ""
fullnameOverride: ""

namespaceOverride: "rag-thesis"

commonLabels:
  app.kubernetes.io/part-of: rag-k8s-thesis

qdrant:
  enabled: true
  image: qdrant/qdrant:latest
  replicaCount: 1
  storageSize: 10Gi
  service:
    port: 6333
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

ollama:
  enabled: true
  image: ollama/ollama:latest
  replicaCount: 2
  modelName: qwen2.5:3b
  # Increased default to 40Gi so Ollama can persist both qwen2.5:14b (~10GB)
  # and qwen2.5:32b (~20GB) side by side across the thesis matrix without
  # hitting disk pressure on GKE GPU nodes.
  storageSize: 40Gi
  # Helps large-context models fit on constrained nodes (tune up/down for your thesis runs).
  # Thesis matrix recommendation:
  #   phi3:mini / qwen2.5:3b  -> 2048
  #   qwen2.5:7b              -> 4096
  #   qwen2.5:14b             -> 4096
  #   qwen2.5:32b (L4 tight)  -> 2048
  contextLength: 2048
  keepAlive: 24h
  service:
    port: 11434
  # Default request/limits target the 3B model. For the 7B/14B/32B rows,
  # override with --set ollama.resources.limits.memory=20Gi (see
  # BENCHMARK_MATRIX.md).
  resources:
    requests:
      cpu: 1000m
      memory: 6Gi
    limits:
      cpu: 2000m
      memory: 10Gi
  gpu:
    enabled: false
    count: 1
    nodeSelector:
      accelerator: nvidia
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

backend:
  enabled: true
  image: rag-k8s-thesis/backend:latest
  replicaCount: 2
  service:
    port: 80
    targetPort: 8000
  ingress:
    enabled: true
    host: rag.local
    path: /
    pathType: Prefix
  env:
    llmProvider: ollama
    llmBaseUrl: http://ollama:11434
    llmModel: qwen2.5:3b
    # Resilience: fallback model used if the primary fails after retries.
    # Set to "" to disable the fallback leg.
    llmFallbackModel: phi3:mini
    llmMaxRetries: 2
    llmRetryBackoffSeconds: "1.5"
    qdrantMaxRetries: 1
    qdrantRetryBackoffSeconds: "0.5"
    # Points at the blue/green alias; see ingest_data.py for swap semantics.
    qdrantCollection: thesis_docs_active
    qdrantTopK: 4
    qdrantTopKProduct: 3
    productLatencyMode: true
    ollamaMaxOutputTokens: 256
    ollamaTemperature: 0.1
    warmupLlmOnStartup: true
    embeddingModelName: sentence-transformers/all-MiniLM-L6-v2
    requestTimeoutSeconds: 900
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 3Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 12
    targetCPUUtilizationPercentage: 65

ingestion:
  enabled: true
  image: rag-k8s-thesis/ingestion:latest
  dataset:
    enabled: true
    # hostPath = Minikube/local node path. gcs = download from gs://bucket/prefix into emptyDir (needs GKE SA + bucket IAM).
    source: hostPath
    hostPath: /host/MasterThesis/sec_rag_dataset_50
    mountPath: /data/sec_rag_dataset_50
    dataDir: /data/sec_rag_dataset_50
    gcsUri: ""
  job:
    enabled: true
    backoffLimit: 2
  cronjob:
    enabled: false
    schedule: "0 2 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
  env:
    # Logical alias the API reads from (see ingest_data.py blue/green logic).
    qdrantCollection: thesis_docs_active
    # Prefix used for the dated physical collection (thesis_docs_YYYYMMDD_HHMMSS).
    qdrantCollectionBase: thesis_docs
    # When "true", writes directly into the alias (legacy). Default false enables
    # blue/green: new collection per ingest, atomic alias swap at the end.
    ingestInplace: "false"
    embeddingModelName: sentence-transformers/all-MiniLM-L6-v2
    chunkSize: "800"
    chunkOverlap: "100"
    embeddingBatchSize: "64"
    maxDocs: "0"
    # If non-empty, every ingestion run appends one row to this CSV inside the
    # container (mount a PVC or emptyDir if you want to persist across runs).
    metricsCsv: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

frontend:
  enabled: true
  image: rag-k8s-thesis/frontend:latest
  replicaCount: 1
  service:
    port: 80
    targetPort: 8501
  ingress:
    enabled: true
    host: rag-ui.local
    path: /
    pathType: Prefix
  env:
    backendUrl: http://rag-backend
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
