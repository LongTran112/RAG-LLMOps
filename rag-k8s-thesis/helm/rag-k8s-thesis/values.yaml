nameOverride: ""
fullnameOverride: ""

namespaceOverride: "rag-thesis"

commonLabels:
  app.kubernetes.io/part-of: rag-k8s-thesis

qdrant:
  enabled: true
  image: qdrant/qdrant:latest
  replicaCount: 1
  storageSize: 10Gi
  service:
    port: 6333
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

ollama:
  enabled: true
  image: ollama/ollama:latest
  replicaCount: 1
  modelName: qwen2.5:3b
  storageSize: 30Gi
  # Helps large-context models fit on constrained nodes (tune up/down for your thesis runs).
  contextLength: 2048
  keepAlive: 24h
  service:
    port: 11434
  resources:
    requests:
      cpu: 1000m
      memory: 6Gi
    limits:
      cpu: 2000m
      memory: 10Gi
  gpu:
    enabled: false
    count: 1
    nodeSelector:
      accelerator: nvidia
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

backend:
  enabled: true
  image: rag-k8s-thesis/backend:latest
  replicaCount: 1
  service:
    port: 80
    targetPort: 8000
  ingress:
    enabled: true
    host: rag.local
    path: /
    pathType: Prefix
  env:
    llmProvider: ollama
    llmBaseUrl: http://ollama:11434
    llmModel: qwen2.5:3b
    qdrantCollection: thesis_docs
    qdrantTopK: 4
    qdrantTopKProduct: 3
    productLatencyMode: true
    ollamaMaxOutputTokens: 256
    ollamaTemperature: 0.1
    warmupLlmOnStartup: true
    embeddingModelName: sentence-transformers/all-MiniLM-L6-v2
    requestTimeoutSeconds: 900
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 3Gi

ingestion:
  enabled: true
  image: rag-k8s-thesis/ingestion:latest
  dataset:
    enabled: true
    hostPath: /host/MasterThesis/sec_rag_dataset_50
    mountPath: /data/sec_rag_dataset_50
    dataDir: /data/sec_rag_dataset_50
  job:
    enabled: true
    backoffLimit: 2
  cronjob:
    enabled: false
    schedule: "0 2 * * *"
    failedJobsHistoryLimit: 2
    successfulJobsHistoryLimit: 2
  env:
    qdrantCollection: thesis_docs
    embeddingModelName: sentence-transformers/all-MiniLM-L6-v2
    chunkSize: "800"
    chunkOverlap: "100"
    embeddingBatchSize: "64"
    maxDocs: "0"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

frontend:
  enabled: true
  image: rag-k8s-thesis/frontend:latest
  replicaCount: 1
  service:
    port: 80
    targetPort: 8501
  ingress:
    enabled: true
    host: rag-ui.local
    path: /
    pathType: Prefix
  env:
    backendUrl: http://rag-backend
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
