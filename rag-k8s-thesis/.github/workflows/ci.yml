name: CI

# Lightweight CI for the thesis repo:
#   - Python lint (ruff) for backend, ingestion, scripts
#   - helm lint + helm template for the rag-k8s-thesis chart
#   - records total workflow duration (from the timestamps GitHub exposes)
#
# We DO NOT run the Ollama/Qdrant integration tests here because they need
# GPUs + a live cluster; those are driven by scripts/benchmark*.sh when the
# GKE or Cloud Run environment is up.
#
# The thesis "CI/CD build execution time" metric is read directly from the
# workflow run summary via:
#   gh run list -L 20 --workflow=CI --json databaseId,conclusion,durationMs \
#     > benchmarks/cicd_runs_$(date +%Y%m%d).json

on:
  push:
    branches: [main]
    paths:
      - "rag-k8s-thesis/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: python -m pip install --upgrade ruff

      - name: Run ruff
        working-directory: rag-k8s-thesis
        run: |
          # Keep the ruleset conservative so the thesis code is linted without
          # fighting third-party style; bump as needed.
          ruff check \
            --extend-select=E,F,I,UP,B \
            --ignore=E501 \
            backend ingestion scripts

  helm-check:
    name: Helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: helm lint
        working-directory: rag-k8s-thesis
        run: helm lint helm/rag-k8s-thesis

      - name: helm template (default values)
        working-directory: rag-k8s-thesis
        run: helm template rag-poc helm/rag-k8s-thesis >/dev/null

      - name: helm template (7B overlay)
        working-directory: rag-k8s-thesis
        run: |
          helm template rag-poc helm/rag-k8s-thesis \
            -f helm/rag-k8s-thesis/overrides/model-7b.yaml >/dev/null

      - name: helm template (14B overlay)
        working-directory: rag-k8s-thesis
        run: |
          helm template rag-poc helm/rag-k8s-thesis \
            -f helm/rag-k8s-thesis/overrides/model-14b.yaml >/dev/null

      - name: helm template (32B overlay)
        working-directory: rag-k8s-thesis
        run: |
          helm template rag-poc helm/rag-k8s-thesis \
            -f helm/rag-k8s-thesis/overrides/model-32b.yaml >/dev/null

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck
        working-directory: rag-k8s-thesis
        run: |
          # Keep informational notices enabled (-S info) since scripts run in
          # production-like conditions.
          shellcheck -S warning scripts/*.sh || true
